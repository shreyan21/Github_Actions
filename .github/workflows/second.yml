name: Level 3 - Job Dependencies & Outputs

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    # 1. Define Outputs for this job
    outputs:
      version_number: ${{ steps.set-version.outputs.version }}
      build_status: ${{ steps.build-step.outcome }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version (Step ID is crucial)
        id: set-version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
        
      - name: Build Artifact
        id: build-step
        run: |
          echo "Building version ${{ steps.set-version.outputs.version }}"
          echo "Mock Build Content" > build.txt
          
      - name: Upload Artifact (Passing Files)
        uses: actions/upload-artifact@v4
        with:
          name: my-build-file
          path: build.txt

  deploy:
    runs-on: ubuntu-latest
    # 2. Wait for build job
    needs: build
    
    steps:
      - name: Download Artifact (Getting Files)
        uses: actions/download-artifact@v4
        with:
          name: my-build-file
          
      - name: Check Version from Previous Job
        run: |
          # 3. Access Output from 'build' job
          echo "Deploying version: ${{ needs.build.outputs.version_number }}"
          echo "Build Status was: ${{ needs.build.outputs.build_status }}"
          cat build.txt