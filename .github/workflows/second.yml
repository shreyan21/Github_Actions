on:
    push:
        branches: "*"

jobs: 
  
    display:
        strategy:
            matrix: 
                name: ['ubuntu-latest','debian-latest','fedora-latest']
        runs-on: ${{matrix.name}}
        outputs:
            job_output_name: ${{steps.one.outputs.designation}}
        
        steps:
            - name: Displaying details
              id: one
              run: |
                echo "Repo owner is ${{github.repository_owner}}"
                echo "Workflow is triggered by ${{github.actor}}"
                echo "OS on which github actions is working ${{runner.os}}"
                echo "designation=Software Engineer">>$GITHUB_OUTPUT

    
    disp_output:
        needs: display
        runs-on: ubuntu-latest
        steps:
            - name: Output showing
              run: echo "${{needs.display.outputs.job_output_name}}"


